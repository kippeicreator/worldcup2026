<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="title desc">
  <title id="title">オフサイドポジションとオンサイドの位置関係</title>
  <desc id="desc">右方向へ攻撃する場面で、ボールを出す味方、後方から2人目の守備側競技者、オフサイドライン、オフサイドポジションとオンサイドの攻撃側選手を示した独自図解。</desc>
  <defs>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4">
      <path d="M0 0 L8 4 L0 8 Z" fill="#d8a641"/>
    </marker>
    <pattern id="grass" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="48" height="48" fill="#123f3a"/>
      <rect width="24" height="48" fill="#174a43"/>
    </pattern>
  </defs>
  <rect width="720" height="480" rx="24" fill="#101923"/>
  <text x="36" y="38" fill="#f4f0e8" font-family="system-ui, sans-serif" font-size="22" font-weight="700">オフサイドの位置関係</text>
  <line x1="456" y1="30" x2="672" y2="30" stroke="#d8a641" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="522" y="22" fill="#f0c96f" font-family="system-ui, sans-serif" font-size="17" font-weight="700">攻撃方向</text>

  <rect x="34" y="68" width="652" height="324" rx="8" fill="url(#grass)" stroke="#f4f0e8" stroke-width="3"/>
  <line x1="360" y1="68" x2="360" y2="392" stroke="#f4f0e8" stroke-width="2" opacity=".8"/>
  <circle cx="360" cy="230" r="50" fill="none" stroke="#f4f0e8" stroke-width="2" opacity=".8"/>
  <rect x="610" y="133" width="76" height="194" fill="none" stroke="#f4f0e8" stroke-width="2" opacity=".8"/>
  <rect x="676" y="184" width="10" height="92" fill="none" stroke="#d8a641" stroke-width="4"/>

  <line x1="500" y1="68" x2="500" y2="392" stroke="#f0c96f" stroke-width="5" stroke-dasharray="12 9"/>
  <rect x="430" y="75" width="184" height="32" rx="16" fill="#101923" opacity=".92"/>
  <text x="445" y="97" fill="#f0c96f" font-family="system-ui, sans-serif" font-size="16" font-weight="700">オフサイドライン</text>

  <circle cx="235" cy="245" r="18" fill="#d8a641" stroke="#fff7e7" stroke-width="4"/>
  <text x="160" y="292" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">パスを出す味方</text>
  <circle cx="273" cy="230" r="10" fill="#fff" stroke="#101923" stroke-width="3"/>
  <text x="255" y="211" fill="#fff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">ボール</text>
  <line x1="286" y1="230" x2="540" y2="166" stroke="#fff" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow)"/>

  <rect x="486" y="280" width="28" height="28" rx="5" fill="#6fb6e8" stroke="#fff" stroke-width="3"/>
  <text x="406" y="332" fill="#d9efff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">後方から2人目の</text>
  <text x="418" y="352" fill="#d9efff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">守備側競技者</text>
  <rect x="600" y="225" width="28" height="28" rx="5" fill="#6fb6e8" stroke="#fff" stroke-width="3"/>
  <text x="575" y="274" fill="#d9efff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">守備側</text>

  <path d="M555 130 L574 166 L536 166 Z" fill="#d8a641" stroke="#fff7e7" stroke-width="3"/>
  <text x="524" y="120" fill="#f0c96f" font-family="system-ui, sans-serif" font-size="15" font-weight="700">攻撃側選手</text>
  <rect x="518" y="174" width="118" height="28" rx="14" fill="#101923" opacity=".94"/>
  <text x="529" y="194" fill="#f0c96f" font-family="system-ui, sans-serif" font-size="14" font-weight="700">オフサイド位置</text>

  <path d="M445 198 L464 234 L426 234 Z" fill="#62c6a2" stroke="#fff" stroke-width="3"/>
  <text x="397" y="257" fill="#d8fff1" font-family="system-ui, sans-serif" font-size="15" font-weight="700">オンサイド例</text>

  <g transform="translate(38 416)">
    <path d="M0 0 L14 26 L-14 26 Z" fill="#d8a641" stroke="#fff" stroke-width="2"/>
    <text x="25" y="20" fill="#f4f0e8" font-family="system-ui, sans-serif" font-size="15">攻撃側（三角）</text>
    <rect x="180" y="0" width="24" height="24" rx="4" fill="#6fb6e8" stroke="#fff" stroke-width="2"/>
    <text x="216" y="19" fill="#f4f0e8" font-family="system-ui, sans-serif" font-size="15">守備側（四角）</text>
    <circle cx="395" cy="12" r="10" fill="#fff" stroke="#101923" stroke-width="2"/>
    <text x="416" y="19" fill="#f4f0e8" font-family="system-ui, sans-serif" font-size="15">ボール</text>
  </g>
</svg>
